name: 01 Setting up Project

on:
    workflow_dispatch:

jobs:
    backend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code 
              uses: actions/checkout@v5
            - name: Setup Python
              uses: actions/setup-python@6
            - name: Github events
              run: |
                echo "triggered by ${{ github.event.name }}"
                echo "Github actor: ${{ github.actor }}"
                echo "Github SHA: ${{ github.sha }}"